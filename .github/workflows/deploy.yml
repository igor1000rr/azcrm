name: Deploy to VPS

on:
  push:
    branches: [main]
    # Документационные изменения не триггерят полный деплой —
    # это страховка от инцидента 05.05.2026 когда push в docs/
    # запустил workflow и npm run build упал из-за OOM на VPS
    # (RAM 4 GB загружена на 98% базово). Если нужно срочно
    # передеплоить только из-за doc-изменений — workflow_dispatch.
    paths-ignore:
      - 'docs/**'
      - 'reports/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-azcrm
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure target directory
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /home/igorcrm/azcrm /home/igorcrm/logs"

      - name: Rsync code
        run: |
          rsync -avz --delete \
            --exclude '/.git' \
            --exclude 'node_modules' \
            --exclude '/.next' \
            --exclude '/storage' \
            --exclude '/.env' \
            --exclude '/whatsapp-worker/sessions' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/igorcrm/azcrm/

      - name: Build and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd /home/igorcrm/azcrm
            npm install --no-audit --no-fund
            cd whatsapp-worker && npm install --no-audit --no-fund && cd ..
            # Синхронизация схемы БД с prisma/schema.prisma.
            # Используем db push т.к. в проекте нет папки prisma/migrations
            # (workflow без файлов миграций — изменения схемы коммитятся
            # сразу в schema.prisma и применяются на сервере push'ем).
            # Без --accept-data-loss: при удалении колонок упадёт, чтобы
            # случайно не потерять данные.
            npx prisma db push --skip-generate
            npx prisma generate
            # NODE_OPTIONS лимитирует heap node. На VPS 4 GB RAM,
            # без лимита next build пытался выделить ~2 GB и при
            # параллельной нагрузке (OnlyOffice/PG/worker) ловил
            # OOM-killer (инцидент 05.05.2026). 1536 MB достаточно
            # для проекта такого размера, проверено на проде.
            NODE_OPTIONS="--max-old-space-size=1536" npm run build
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save
